name: Build Superbrain Desktop

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        # os: [ubuntu-latest, macos-14, windows-latest]
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Setup Conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: "3.10"
          activate-environment: btenv

      - name: Install Bittensor + Pack Env
        shell: bash
        if: runner.os != 'Windows'
        run: |
          pip install --upgrade pip
          pip install bittensor
          conda install -y conda-pack
          PLATFORM_KEY=""
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            ARCH=$(uname -m)
            if [[ "$ARCH" == "arm64" ]]; then PLATFORM_KEY="darwin-arm64"; else PLATFORM_KEY="darwin-x64"; fi
          elif [[ "$RUNNER_OS" == "Linux" ]]; then
            PLATFORM_KEY="linux-x64"
          else
            PLATFORM_KEY="win-x64"
          fi
          conda pack -n btenv -o bittensor-env-$PLATFORM_KEY.tar.gz
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            tar -xzf bittensor-env-win-x64.tar.gz
            powershell -c "Compress-Archive -Path btenv -DestinationPath bittensor-env-win-x64.zip"
            rm -rf btenv bittensor-env-win-x64.tar.gz
          fi

      - name: Upload Env to S3
        if: runner.os != 'Windows'
        run: |
          aws s3 cp bittensor-env-* s3://bittensor-envs/${{ github.ref_name }}/
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1

      - name: Clear npm cache
        run: npm cache clean --force

      - name: Install dependencies
        run: |
          # rm -rf node_modules
          rm package-lock.json
          npm install
          # Force git of native modules
          npm rebuild

      - name: Fix Native Binaries (Linux)
        if: runner.os == 'Linux'
        run: |
          npm install @rollup/rollup-linux-x64-gnu --no-save || true

      - name: Rebuild Electron Native Modules
        run: npx electron-rebuild

      - name: Download Env for Packaging
        if: runner.os != 'Windows'
        run: |
          mkdir -p vendor
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            ARCH=$(uname -m)
            if [[ "$ARCH" == "arm64" ]]; then FILE=bittensor-env-darwin-arm64.tar.gz; else FILE=bittensor-env-darwin-x64.tar.gz; fi
          elif [[ "$RUNNER_OS" == "Linux" ]]; then
            FILE=bittensor-env-linux-x64.tar.gz
          else
            FILE=bittensor-env-win-x64.zip
          fi
          aws s3 cp s3://bittensor-envs/${{ github.ref_name }}/$FILE vendor/$FILE
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1

      - name: Build Electron App (macOS)
        if: runner.os == 'macOS'
        run: npm run build:mac

      - name: Build Electron App (Linux)
        if: runner.os == 'Linux'
        run: npm run build:linux

      - name: Build Electron App (Windows)
        if: runner.os == 'Windows'
        run: npm run build:win

      - name: Upload Installers to S3
        run: |
          aws s3 cp dist/ s3://superbrain-desktop-builds/${{ github.ref_name }}/ --recursive
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
